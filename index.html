<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Market Gambia | Alibaba Style Hub</title>
    <style>
        body { background-color: #000000; color: #00ff00; font-family: monospace; padding: 20px; line-height: 1.6; text-align: center;}
        .border-box { border: 2px solid #00ff00; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .seller-portal { border: 2px dashed #1dcaff; color: #1dcaff; padding: 20px; margin-bottom: 30px; }
        button { border: none; padding: 15px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; margin: 10px 0; font-size: 1.1em; }
        .btn-post { background-color: #1dcaff; color: white; }
        .btn-whatsapp { background-color: #25D366; color: white; }
        .price-tag { color: gold; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>[ E-MARKET GAMBIA ]</h1>
        <p>Brikama's Automated Tech Marketplace</p>
    </header>

    <!-- SELLER PORTAL -->
    <div class="seller-portal">
        <h2>OPEN YOUR SHOP</h2>
        <p>Post Unlimited Items for <span class="price-tag">D500/Month</span></p>
        
        <!-- STEP 1: THEY PAY YOU -->
        <button class="btn-post" onclick="location.href='https://wave.com'">
            1. PAY VIA WAVE (D500)
        </button>

        <!-- STEP 2: THEY SUBMIT THE PRODUCT (Automation) -->
        <button style="background-color: white; color: black;" onclick="alert('Redirecting to Seller Upload Form...')">
            2. UPLOAD PRODUCT DATA
        </button>
    </div>

    <div class="border-box">
        <h2>--- LATEST LISTINGS ---</h2>
        <p><i>Automation Engine Initializing...</i></p>
        <!-- Your automated products will appear here soon -->
    </div>

    <footer>
        <p>Security Level: Encrypted | Location: Brikama Garage</p>
    </footer>

</body>
</html>
