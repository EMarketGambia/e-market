<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Market Gambia | Alibaba Style Hub</title>
    <style>
        body { background-color: #000000; color: #00ff00; font-family: monospace; padding: 20px; line-height: 1.6; text-align: center;}
        .border-box { border: 2px solid #00ff00; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        .seller-portal { border: 2px dashed #1dcaff; color: #1dcaff; padding: 20px; margin-bottom: 30px; border-radius: 8px;}
        button { border: none; padding: 15px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; margin: 10px 0; font-size: 1.1em; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: scale(1.02); }
        .btn-wave { background-color: #1dcaff; color: white; }
        .btn-upload { background-color: #ffffff; color: #000000; }
        .btn-whatsapp { background-color: #25D366; color: white; }
        .btn-africell { background-color: #ff8c00; color: white; } /* Africell Orange */
        .price-tag { color: gold; font-size: 1.2em; font-weight: bold; }
        .secure-tag { color: #5555ff; font-size: 0.8em; font-weight: bold; text-transform: uppercase; }
    </style>
</head>
<body>

    <header style="border-bottom: 1px solid #333; padding-bottom: 20px; margin-bottom: 20px;">
        <span class="secure-tag">[ SECURE MARKETPLACE ACTIVE ]</span>
        <h1>[ E-MARKET GAMBIA ]</h1>
        <p>Brikama Garage Automated Tech & Trade</p>
    </header>

    <!-- SELLER PORTAL -->
    <div class="seller-portal">
        <h2>--- OPEN YOUR SHOP ---</h2>
        <p>Post your products for only <span class="price-tag">D500/Month</span></p>
        
        <button class="btn-wave" onclick="location.href='https://wave.com'">
            1. PAY D500 VIA WAVE
        </button>

        <button class="btn-upload" onclick="location.href='https://google.com'">
            2. UPLOAD PRODUCT DATA
        </button>
    </div>

    <!-- MAIN CONTACT AREA -->
    <div class="border-box">
        <h2>--- CONTACT ADMIN ---</h2>
        
        <button class="btn-whatsapp" onclick="location.href='https://whatsapp.com.'">
            MESSAGE QCELL (3679533)
        </button>

        <button class="btn-africell" onclick="location.href='https://whatsapp.com.'">
            MESSAGE AFRICELL (2071291)
        </button>
    </div>

    <footer style="margin-top: 40px; border-top: 1px solid #333; padding-top: 10px; font-size: 0.8em; color: #666;">
        <p>Technician: Ebrima | Brikama Garage, Gambia</p>
        <p>Secure Node & Automated via GitHub/Google</p>
    </footer>

</body>
</html>
