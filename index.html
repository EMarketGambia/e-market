<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Market Gambia</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <strong>E-MARKET GAMBIA</strong>
    <input type="text" class="search-bar" placeholder="Search phones, repairs, cables...">
</header>

<div class="categories">
    <div class="cat-item"><div class="cat-icon">📱</div>Phones</div>
    <div class="cat-item"><div class="cat-icon">🛠️</div>Repairs</div>
    <div class="cat-item"><div class="cat-icon">🔌</div>Cables</div>
    <div class="cat-item"><div class="cat-icon">🎧</div>Audio</div>
</div>

<div class="action-box">
    <h3>Vendor Dashboard</h3>
    <button class="btn-wave" onclick="showWave()">1. PAY D500 VIA WAVE</button>
    <a href="https://google.com" class="btn-upload">2. UPLOAD PRODUCT</a>
</div>

<h2>Live Listings</h2>
<div class="product-grid" id="market-grid">
    <p style="grid-column: 1/3; text-align: center;">Scanning Brikama Garage Database...</p>
</div>

<script src="script.js"></script>
</body>
</html>
