<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Market Gambia | Secure Hub</title>
    <style>
        :root { --main-blue: #1dcaff; --main-green: #00ff00; --dark-bg: #0a0a0a; }
        body { background: var(--dark-bg); color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; text-align: center; }
        
        /* ALIBABA STYLE HEADER */
        .app-header { background: #111; padding: 15px; border-bottom: 2px solid var(--main-blue); position: sticky; top: 0; z-index: 1000; }
        .search-bar { background: #222; border-radius: 20px; padding: 10px; color: #888; font-size: 0.9em; margin-top: 10px; border: 1px solid #333; }

        /* CATEGORY SLIDER */
        .categories { display: flex; overflow-x: auto; padding: 15px; gap: 20px; background: #111; }
        .cat-item { min-width: 70px; font-size: 0.7em; color: var(--main-blue); }
        .cat-icon { width: 45px; height: 45px; background: #222; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 5px; font-size: 1.5em; border: 1px solid var(--main-blue); }

        /* POP-UP STYLE */
        #welcome-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .popup-box { background: #1a1a1a; padding: 30px; border-radius: 20px; border: 2px solid var(--main-green); width: 80%; }

        .container { padding: 15px; }
        .btn-wave { background: var(--main-blue); color: #fff; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; border: none; font-size: 1.1em; box-shadow: 0 4px 15px rgba(29, 202, 255, 0.3); }
        .card { background: #1a1a1a; border-radius: 15px; padding: 20px; border: 1px solid #333; margin-bottom: 20px; }
    </style>
</head>
<body>

    <!-- ALIBABA STYLE WELCOME POP-UP -->
    <div id="welcome-popup">
        <div class="popup-box">
            <h2 style="color: var(--main-green);">Welcome to E-Market</h2>
            <p>Brikama's #1 Secure Tech Hub is now Live!</p>
            <button class="btn-wave" onclick="closePopup()">ENTER SHOP</button>
        </div>
    </div>

    <div class="app-header">
        <h1 style="margin:0; font-size: 1.2em; color: var(--main-blue);">E-MARKET GAMBIA</h1>
        <div class="search-bar">🔍 Search for chargers, buds, repairs...</div>
    </div>

    <div class="categories">
        <div class="cat-item"><div class="cat-icon">📱</div>Phones</div>
        <div class="cat-item"><div class="cat-icon">🛠️</div>Repairs</div>
        <div class="cat-item"><div class="cat-icon">🔌</div>Cables</div>
        <div class="cat-item"><div class="cat-icon">🎧</div>Audio</div>
    </div>

    <div class="container">
        <div class="card">
            <h2 style="margin-top:0;">POST PRODUCT</h2>
            <button class="btn-wave" onclick="location.href='https://wave.com'">1. PAY D500 VIA WAVE</button>
            <button style="background:#fff; color:#000; padding:15px; border-radius:12px; border:none; width:100%; margin-top:10px; font-weight:bold;" onclick="location.href='https://google.com'">2. UPLOAD DATA</button>
        </div>

        <h3>LIVE LISTINGS</h3>
        <div id="market-feed" style="color: #666; font-size: 0.9em;">Scanning Brikama Garage Database...</div>
    </div>

    <script>
        function closePopup() { document.getElementById('welcome-popup').style.display = 'none'; }
        
        // This makes the APK handle the link correctly
        function triggerWave() {
            window.location.href = "https://wave.com";
        }
    </script>

</body>
</html>
