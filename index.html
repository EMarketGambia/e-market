<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Market Gambia | Secure Hub</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Segoe UI', sans-serif; padding: 0; margin: 0; text-align: center; }
        .hero { background: linear-gradient(135deg, #1dcaff 0%, #00ff00 100%); color: black; padding: 50px 20px; }
        .hero h1 { margin: 0; font-size: 3em; }
        
        .container { padding: 20px; max-width: 900px; margin: auto; }
        
        /* FEATURED GADGETS STYLE */
        .gadget-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin: 30px 0; }
        .gadget-card { background: #1a1a1a; border-radius: 15px; padding: 15px; border: 1px solid #333; }
        .gadget-card img { width: 100%; border-radius: 10px; height: 150px; object-fit: cover; margin-bottom: 10px; }
        
        .btn-wave { background-color: #1dcaff; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-whatsapp { background-color: #25D366; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; }
        
        .price-tag { color: gold; font-weight: bold; font-size: 1.2em; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>[ E-MARKET ]</h1>
        <p>Brikama Garage Premium Tech Hub</p>
    </div>

    <div class="container">
        <!-- FEATURED PRODUCTS ADVERTISING -->
        <h2 style="color: white;">--- FEATURED GADGETS ---</h2>
        <div class="gadget-row">
            <div class="gadget-card">
                <img src="https://unsplash.com" alt="Earbuds">
                <h4>Premium Earbuds</h4>
                <p class="price-tag">D750</p>
            </div>
            <div class="gadget-card">
                <img src="https://unsplash.com" alt="Charger">
                <h4>Fast Charger (20W)</h4>
                <p class="price-tag">D450</p>
            </div>
            <div class="gadget-card">
                <img src="https://unsplash.com" alt="Cables">
                <h4>Data Cables</h4>
                <p class="price-tag">D200</p>
            </div>
        </div>

        <div style="border: 2px dashed #1dcaff; padding: 20px; border-radius: 15px;">
            <h3 style="color: #1dcaff;">POST YOUR OWN PRODUCT</h3>
            <button class="btn-wave" onclick="window.location.href='https://wave.com'">1. PAY D500 VIA WAVE</button>
            <button style="background: white; color: black; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px;" onclick="window.location.href='https://google.com'">2. UPLOAD PRODUCT DATA</button>
        </div>

        <h3 style="margin-top: 30px;">SUPPORT</h3>
        <button class="btn-whatsapp" onclick="window.location.href='https://wa.me'">CONTACT EBRIMA (QCELL)</button>
    </div>

</body>
</html>
