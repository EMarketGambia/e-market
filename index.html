<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>E-MARKET GAMBIA</h1>
        <input type="text" class="search-bar" placeholder="Search products...">
    </header>

    <div class="product-card">
        <h3>Samsung Galaxy Screen Repair</h3>
        <p class="price">D500</p>
        
        <div class="action-buttons">
            <!-- Automated Wave Payment -->
            <button onclick="startWavePayment('D500')" class="btn pay-btn">Pay with Wave (Auto)</button>
            
            <!-- Direct WhatsApp Chat to Ebrima -->
            <a href="https://wa.me" 
               class="btn chat-btn" target="_blank">Chat with Seller</a>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
