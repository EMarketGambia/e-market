<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Market Gambia</title>
    <!-- This line connects your CSS - make sure the filename matches exactly! -->
    <link rel="stylesheet" href="style.css">
    <!-- Icons for that Alibaba look -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

<header>
    <div class="logo">E-MARKET GAMBIA</div>
    <div class="search-box">
        <input type="text" placeholder="Search phones, repairs, chargers...">
        <i class="fas fa-search"></i>
    </div>
</header>

<nav class="categories">
    <div class="cat-item"><i class="fas fa-mobile-alt"></i><span>Phones</span></div>
    <div class="cat-item"><i class="fas fa-tools"></i><span>Repairs</span></div>
    <div class="cat-item"><i class="fas fa-plug"></i><span>Cables</span></div>
    <div class="cat-item"><i class="fas fa-headphones"></i><span>Audio</span></div>
</nav>

<main class="market-feed">
    <div class="product-card">
        <div class="badge">Brikama Garage</div>
        <h3>Pro Phone Repair Service</h3>
        <p class="price">D500</p>
        
        <div class="btn-group">
            <!-- Automated Wave Button -->
            <button onclick="payWave()" class="btn wave-btn">
                <i class="fas fa-wallet"></i> Pay with Wave
            </button>
            
            <!-- Working WhatsApp Button -->
            <a href="https://wa.me" class="btn wa-btn">
                <i class="fab fa-whatsapp"></i> Chat Seller
            </a>
        </div>
    </div>
</main>

<script>
    function payWave() {
        // This will redirect to your Wave payment link
        window.location.href = "https://wave.com"; 
    }
</script>

</body>
</html>
